<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود / ثبت نام</title>
</head>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500&display=swap");

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  font-family: "Vazirmatn", sans-serif;
  overflow: hidden;
  position: relative;
}

.container {
  position: relative;
  width: 480px;
  min-height: 480px;
  height: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0;
  transition: min-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.container.signup-mode {
  min-height: 620px;
}

.orb {
  position: absolute;
  inset: 0;
  min-height: 480px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.container.signup-mode .orb {
  min-height: 620px;
}

.orb-1 {
  border-radius: 42% 58% 60% 40% / 45% 48% 52% 55%;
  animation: rotate-clockwise 8s ease-in-out infinite;
}

.orb-2 {
  border-radius: 55% 45% 48% 52% / 60% 40% 58% 42%;
  animation: rotate-counter 6s ease-in-out infinite;
}

.orb-3 {
  border-radius: 48% 52% 45% 55% / 58% 42% 60% 40%;
  animation: rotate-clockwise 12s linear infinite;
}

.container:hover .orb {
  border-width: 4px;
  border-color: var(--orb-color);
  filter: drop-shadow(0 0 25px var(--orb-color));
  opacity: 0.9;
}

.container.signup-mode .orb-1 {
  --orb-color: #10b981;
}

.container.signup-mode .orb-2 {
  --orb-color: #8b5cf6;
}

.container.signup-mode .orb-3 {
  --orb-color: #f97316;
}

@keyframes rotate-clockwise {
  0% {
    transform: rotate(0deg) scale(1);
  }
  50% {
    transform: rotate(180deg) scale(1.05);
  }
  100% {
    transform: rotate(360deg) scale(1);
  }
}

@keyframes rotate-counter {
  0% {
    transform: rotate(360deg) scale(1);
  }
  50% {
    transform: rotate(180deg) scale(0.95);
  }
  100% {
    transform: rotate(0deg) scale(1);
  }
}

.forms-wrapper {
  position: relative;
  width: 320px;
  min-height: 400px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: min-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.auth-form {
  position: absolute;
  width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  z-index: 10;
  opacity: 0;
  transform: translateX(50px) scale(0.9);
  pointer-events: none;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.auth-form.active {
  opacity: 1;
  transform: translateX(0) scale(1);
  pointer-events: all;
}

.login-form {
  transform: translateX(50px) scale(0.9);
}

.login-form.active {
  transform: translateX(0) scale(1);
}

.signup-form {
  transform: translateX(-50px) scale(0.9);
}

.signup-form.active {
  transform: translateX(0) scale(1);
}

.form-title {
  font-size: 2.5rem;
  font-weight: 500;
  color: #ffffff;
  margin-bottom: 8px;
  text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
}

.field-wrapper {
  position: relative;
  width: 100%;
}

.field-wrapper input {
  width: 100%;
  padding: 14px 22px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 50px;
  font-size: 1.1rem;
  color: #ffffff;
  font-family: inherit;
  transition: all 0.3s ease;
  outline: none;
}

.field-wrapper input:focus {
  border-color: rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
}

.field-wrapper input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #0ea5e9 0%, #ec4899 50%, #f59e0b 100%);
  border: none;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: 500;
  color: #ffffff;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
  box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(14, 165, 233, 0.5);
}

.submit-btn:active {
  transform: translateY(0);
}

.form-footer {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
}

.footer-link {
  color: rgba(255, 255, 255, 0.8);
  text-decoration: none;
  font-size: 0.95rem;
  transition: color 0.3s ease;
}

.footer-link:hover {
  color: #ffffff;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
}
    </style>
<body>
  <div class="container">
    <div class="orb orb-1" style="--orb-color:#0ea5e9;"></div>
    <div class="orb orb-2" style="--orb-color:#ec4899;"></div>
    <div class="orb orb-3" style="--orb-color:#f59e0b;"></div>
    
    <div class="forms-wrapper">
      <form class="auth-form login-form active">
        <h1 class="form-title">ورود</h1>
        
        <div class="field-wrapper">
          <input type="text" id="login-username" placeholder="نام کاربری" required>
        </div>
        
        <div class="field-wrapper">
          <input type="password" id="login-password" placeholder="رمز عبور" required>
        </div>
        
        <button type="submit" class="submit-btn">ورود</button>
        
        <div class="form-footer">
          <a href="#" class="footer-link">فراموشی رمز</a>
          <a href="#" class="footer-link toggle-form">ثبت نام</a>
        </div>
      </form>

      <form class="auth-form signup-form">
        <h1 class="form-title">ثبت نام</h1>
        
        <div class="field-wrapper">
          <input type="text" id="signup-fullname" placeholder="نام و نام خانوادگی" required>
        </div>
        
        <div class="field-wrapper">
          <input type="text" id="signup-username" placeholder="نام کاربری" required>
        </div>
        
        <div class="field-wrapper">
          <input type="email" id="signup-email" placeholder="ایمیل" required>
        </div>
        
        <div class="field-wrapper">
          <input type="password" id="signup-password" placeholder="رمز عبور" required>
        </div>
        
        <div class="field-wrapper">
          <input type="password" id="signup-confirm-password" placeholder="تکرار رمز عبور" required>
        </div>
        
        <button type="submit" class="submit-btn">ثبت نام</button>
        
        <div class="form-footer">
          <a href="#" class="footer-link toggle-form">ورود به سیستم</a>
        </div>
      </form>
    </div>
  </div>

  <script src="./script.js"></script>
</body>

</html>
