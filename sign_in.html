<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap");

    body {
      background: #1a0e0a;
      min-height: 100vh;
      margin: 0;
      font-family: "Montserrat", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: linear-gradient(135deg, #1a0e0a 80%, #ff7c2a22 100%);
      border-radius: 24px;
      box-shadow: 0 8px 32px #000a;
      padding: 40px 32px 32px 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid #ff7c2a44;
    }

    .logo {
      margin-bottom: 18px;
    }

    .tabs {
      width: 100%;
      display: flex;
      position: relative;
      margin-bottom: 18px;
      justify-content: space-between;
    }
    .tab {
      flex: 1;
      text-align: center;
      color: #fff;
      font-size: 1.18rem;
      font-weight: 500;
      padding-bottom: 8px;
      cursor: pointer;
      opacity: 0.8;
      transition:
        color 0.2s,
        opacity 0.2s;
    }
    .tab.active {
      color: #ff7c2a;
      opacity: 1;
    }
    .tab-underline {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 50%;
      height: 3px;
      background: linear-gradient(90deg, #ff7c2a 60%, #ff3c2a 100%);
      border-radius: 2px;
      transition: left 0.3s;
    }
    .tabs .tab.active ~ .tab-underline {
      left: 0;
    }
    .tabs .tab:nth-child(2).active ~ .tab-underline {
      left: 50%;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 18px;
    }
    .input-group {
      display: flex;
      align-items: center;
      background: #23120f;
      border-radius: 8px;
      padding: 0 12px;
      border-bottom: 1.5px solid #ff7c2a44;
      height: 44px;
      margin-bottom: 2px;
    }
    .input-group .icon {
      width: 22px;
      height: 22px;
      margin-right: 10px;
      display: inline-block;
      background-size: contain;
      background-repeat: no-repeat;
    }
    .icon.mail {
      background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%23ff7c2a" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M22 5 12 13 2 5"/></svg>');
    }
    .icon.lock {
      background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%23ff7c2a" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="16" height="10" x="4" y="11" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>');
    }
    .input-group input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 1rem;
      flex: 1;
      padding: 10px 0;
      font-family: inherit;
    }
    .input-group input::placeholder {
      color: #fff8;
      font-size: 1rem;
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      margin-bottom: 8px;
    }
    .remember-label {
      color: #fff;
      font-size: 0.98rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .toggle {
      display: none;
    }
    .slider {
      width: 38px;
      height: 22px;
      background: #23120f;
      border-radius: 12px;
      position: relative;
      transition: background 0.2s;
      box-shadow: 0 1px 4px #0004;
      border: 1.5px solid #ff7c2a44;
      cursor: pointer;
    }
    .slider:before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #ff7c2a 60%, #ff3c2a 100%);
      border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle:checked + .slider {
      background: #ff7c2a44;
    }
    .toggle:checked + .slider:before {
      left: 19px;
    }

    /* برای اینکه روی کل لیبل کلیک شود چک‌باکس تغییر کند */
    .remember-label {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sign-in-btn {
      width: 100%;
      background: transparent;
      color: #fff;
      border: 2px solid #ff7c2a;
      border-radius: 24px;
      padding: 12px 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 8px;
      cursor: pointer;
      transition:
        background 0.2s,
        color 0.2s;
      box-shadow: 0 2px 8px #ff7c2a22;
    }
    .sign-in-btn:hover {
      background: linear-gradient(90deg, #ff7c2a 60%, #ff3c2a 100%);
      color: #fff;
    }

    .forgot {
      color: #fff;
      opacity: 0.7;
      font-size: 1.01rem;
      text-align: center;
      margin-top: 8px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .forgot:hover {
      color: #ff7c2a;
    }
  </style>
  <body>
    <div class="container">
      <div class="logo">
        <svg
          width="120"
          height="120"
          viewBox="0 0 120 120"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <circle cx="60" cy="60" r="55" stroke="#FF7C2A" stroke-width="4" />
          <path
            d="M60 20 A40 40 0 1 1 20 60"
            stroke="#FF7C2A"
            stroke-width="12"
            fill="none"
          />
          <path
            d="M60 100 A40 40 0 1 1 100 60"
            stroke="#FF3C2A"
            stroke-width="12"
            fill="none"
          />
          <circle cx="60" cy="60" r="20" stroke="#FF7C2A" stroke-width="4" />
        </svg>
      </div>
      <div class="tabs">
        <div class="tab active">Sign In</div>
        <div class="tab">Sign Up</div>
        <div class="tab-underline"></div>
      </div>
      <form class="login-form">
        <div class="input-group">
          <span class="icon mail"></span>
          <input type="text" placeholder="Username" required />
        </div>
        <div class="input-group">
          <span class="icon lock"></span>
          <input type="password" placeholder="Password" required />
        </div>
        <div class="remember-row">
          <label class="remember-label">
            Remember me
            <input type="checkbox" class="toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <button type="submit" class="sign-in-btn">SIGN IN</button>
      </form>
      <div class="forgot">Forgot your password?</div>
    </div>
    <script src="assets/JS/sign_in.js"></script>
  </body>
</html>
