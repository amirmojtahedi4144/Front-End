<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iran</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        border: none;
        outline: none;
    }

    body{
        background-color: #fff;
        padding: 40px;
    }

    h1{
        font-size: 40px;
        font-weight: bold;
        direction: rtl;
        text-align: right;
    }

    h1 span{
        color: red;
    }

    .gallery{
        display: grid;
        grid-template-columns: repeat(12 , 1fr);
        grid-template-rows: repeat(3 , 180px);
        gap: 20px;
        margin-top: 40px;
    }

    .gallery img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 16px;
    }

    .num1{
        grid-column: 1/4;
        grid-row: 1/2;
    }

    .num2{
        grid-column: 4/10;
        grid-row: 1/3;
    }

    .num3{
        grid-column: 10/13;
        grid-row: 1/3;
    }

    .num4{
        grid-column: 1/4;
        grid-row: 2/4;
    }

    .num5{
        grid-column: 4/6;
        grid-row: 3/4;
    }

    .num6{
        grid-column: 6/10;
        grid-row: 3/4;
    }

    .num7{
        grid-column: 10/13;
        grid-row: 3/4;
    }

    @media(max-width:768px){
        .gallery{
            display: flex;
            flex-direction: column;
        }
        .gallery >div{
            width: 100%;
            height: 250px;
        }
        .gallery img{
            height: 100%;
            border-radius: 17px;
        }
        .num1, .num2, .num3, .num4, .num5, .num6, .num7{
            grid-column: auto !important;
            grid-row: auto !important;
        }
    }
</style>
<body>
    <h1>سفر  به <span>ایران</span></h1>
    <div class="gallery">
        <div class="num1"><img src="assets/IMAGES/iran.jfif" alt=""></div>
        <div class="num2"><img src="assets/IMAGES/iran2.jfif" alt=""></div>
        <div class="num3"><img src="assets/IMAGES/iran3.jfif" alt=""></div>
        <div class="num4"><img src="assets/IMAGES/iran4.jfif" alt=""></div>
        <div class="num5"><img src="assets/IMAGES/iran5.jfif" alt=""></div>
        <div class="num6"><img src="assets/IMAGES/iran6.jfif" alt=""></div>
        <div class="num7"><img src="assets/IMAGES/iran7.jfif" alt=""></div>
    </div>
</body>

</html>
