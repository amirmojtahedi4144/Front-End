<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل کاربر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            outline: none;
        }

        body {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
            direction: rtl;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            max-width: 400px;
            width: 90%;
            background-color: orangered;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card_action {
            display: flex;
            justify-content: space-between;
            padding: 20px 20px 0 20px;
        }

        .card_action a {
            background-color: #f0f2f5;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #4a5568;
            font-size: 18px;
            transition: all 0.2s;
        }

        .card_action a:hover {
            background-color: #e2e8f0;
            color: #2d3748;
            transform: scale(1.05);
        }

        .profile {
            text-align: center;
            margin-top: 10px;
        }

        .profile img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            background-color: #fff;
        }

        .profile_info {
            text-align: center;
            padding: 20px 25px 30px;
        }

        .profile_info h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            margin-top: 15px;
            margin-bottom: 6px;
        }

        .profile_info h3 {
            font-size: 16px;
            font-weight: 500;
            color: #4e4e4e;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .profile_box {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 20px 0 25px;
        }

        .profile_box a {
            background-color: #f1f5f9;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #334155;
            font-size: 22px;
            transition: all 0.2s ease;
        }

        .profile_box a:hover {
            background-color: #e2e8f0;
            transform: translateY(-3px);
            color: #0f172a;
        }

        button {
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 14px rgba(37, 99, 235, 0.25);
            transition: all 0.25s;
            margin-bottom: 25px;
            width: 80%;
            max-width: 220px;
            font-family: inherit;
        }

        button:hover {
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            transform: scale(1.02);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.35);
        }

        .more_info {
            margin-top: 10px;
        }

        .more_info a {
            color: #3b82f6;
            font-weight: 500;
            font-size: 14px;
            background-color: #eff6ff;
            padding: 10px 20px;
            border-radius: 60px;
            display: inline-block;
            transition: all 0.2s;
        }

        .more_info a:hover {
            background-color: #dbeafe;
            color: #1e40af;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .card {
                width: 92%;
            }

            .profile_info h1 {
                font-size: 22px;
            }

            button {
                width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card_action">
            <a href="#" aria-label="منو"><i class="fas fa-bars"></i></a>
            <a href="#" aria-label="تنظیمات"><i class="fas fa-cog"></i></a>
        </div>
        <div class="profile">
            <img src="assets/IMAGES/Me.jpeg" alt="">
        </div>
        <div class="profile_info">
            <h1>امیر مجتهدی</h1>
            <h3>برنامه نویس ارشد در ساری | توسعه‌دهنده وب</h3>
            <div class="profile_box">
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank"><i class="fab fa-dribbble"></i></a>
            </div>
            <button id="followBtn">دنبال کردن</button>
            <div class="more_info">
                <a href="#">بیشتر درباره من بدانید <i class="fas fa-arrow-left"
                        style="margin-right: 6px; font-size: 12px;"></i></a>
            </div>
        </div>
    </div>
</body>

</html>
