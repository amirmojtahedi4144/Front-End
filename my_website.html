<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            line-height: 1.6;
            background-color: #f5f5f5;
        }
        header {
            background-color: #a80202;
            color: white;
            padding: 1rem;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        header::after {
            content: "";
            display: table;
            clear: both;
        }
        .logo {
            float: right;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0.5rem 0;
        }
        #menu_toggle_checkbox {
            display: none;
        }
        .menu_toggle {
            display: none;
            position: absolute;
            top: 1rem;
            left: 1rem;
            cursor: pointer;
            z-index: 100;
        }
        .menu_toggle_bar {
            background-color: white;
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px 0;
            transition: 0.3s;
            border-radius: 2px;
        }
        .menu {
            float: left;
            margin-top: 8px;
        }
        .nav {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav li {
            display: inline-block;
            margin-right: 1.5rem;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 0.8rem;
            transition: all 0.3s ease;
            display: inline-block;
            font-weight: 500;
        }
        .nav a:hover {
            background-color: #f30606;
            border-radius: 6px;
            color: white;
        }
        main {
            padding: 3rem 2rem;
            text-align: center;
            max-width: 900px;
            margin: 2rem auto;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #a80202;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        p {
            color: #555;
            font-size: 1.1rem;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .menu_toggle {
                display: block;
                position: absolute;
                top: 1.2rem;
                left: 1rem;
            }
            .logo {
                float: none;
                text-align: center;
                width: 100%;
                font-size: 1.3rem;
            }
            .menu {
                float: none;
                clear: both;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease-in-out;
                width: 100%;
                background-color: #a80202;
                margin-top: 1rem;
                border-radius: 12px;
            }
            #menu_toggle_checkbox:checked ~ .menu {
                max-height: 400px;
            }
            .nav li {
                display: block;
                margin: 0;
                text-align: center;
                border-top: 1px solid rgba(255,255,255,0.2);
            }
            .nav li:first-child {
                border-top: none;
            }
            .nav a {
                display: block;
                padding: 0.8rem;
                font-size: 1rem;
            }
            .nav a:hover {
                background-color: #f30606;
                border-radius: 0;
            }
        }
        @media (max-width: 480px) {
            main {
                padding: 1.5rem;
                margin: 1rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">لوگو</div>
    <input type="checkbox" id="menu_toggle_checkbox">    
    <label for="menu_toggle_checkbox" class="menu_toggle">
        <span class="menu_toggle_bar"></span>
        <span class="menu_toggle_bar"></span>
        <span class="menu_toggle_bar"></span>
    </label>
    <nav class="menu">
        <ul class="nav">
            <li><a href="#">خانه</a></li>
            <li><a href="#">درباره ما</a></li>
            <li><a href="#">خدمات</a></li>
            <li><a href="#">نمونه کارها</a></li>
            <li><a href="#">تماس با ما</a></li>
        </ul>
    </nav>
</header>
<main>
    <h1>به وبسایت ما خوش آمدید</h1>
    <p>
        این منوی واکنشگرا است که فقط با HTML و CSS ساخته شده است.<br>
        مرورگر را تغییر دهید تا نحوه عملکرد آن را در دستگاه‌های مختلف ببینید.
    </p>
</main>
</body>
</html>
