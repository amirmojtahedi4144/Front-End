<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eror 404</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        border: none;
        outline: none;
        direction: rtl;
    }
    body{
        background: linear-gradient(135deg , #667eea 0% ,#764ba2 100% );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .container{
        text-align: center;
        color: white;
        position: relative;
        z-index: 2;
    }
    .error_code{
        font-size: 8rem;
        font-weight: bold;
        margin-bottom: 1rem;
        animation: bounce 2s infinite, glow 2s ease-in-out infinite alternate;
        text-shadow: 0 0 20px rgba(255 , 255 , 255 , 0.5);
    }
    .error_message{
        font-size: 1.5rem;
        margin-bottom: 2rem;
        opacity: 0;
        animation: fadeInup 1s ease-out 0.5s forwards;
    }
    .error_description{
        font-size: 1rem;
        margin-bottom: 3rem;
        opacity: 0;
        animation: fadeInup 1s ease-out 1s forwards;
        max-width: 400px;
        line-height: 1.6;
    }
    .home_btn{
        display: inline-block;
        padding: 12px 30px;
        background: rgba(255 , 255 , 255 , 0.2);
        color: white;
        text-decoration: none;
        border-radius: 50px;
        border: 2px solid rgba(255 , 255 , 255 , 0.3);
        font-weight: bold;
        transition: all 0.3s ease;
        opacity: 0;
        animation: fadeInup 1s ease-out 1.5s forwards;
        backdrop-filter: blur(10px);
    }
    .home_btn:hover{
        background: rgba(255 , 255 , 255 , 0.3);
        border-color: rgba(255 , 255 , 255 , 0.5);
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255 , 255 , 255 , 0.2);
    }
    .shape{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1;
    }
    .shapes{
        position: absolute;
        background: rgba(255 , 255 , 255 , 0.1);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
    }
    .shapes:nth-child{
        width: 80px;
        height: 80px;
        top: 20%;
        left: 10%;
        animation-delay: 0s;
    }
    .shapes:nth-child(2){
        width: 120px;
        height: 120px;
        top: 60%;
        left: 80%;
        animation-delay: -2s;
    }
    .shapes:nth-child(3){
        width: 60px;
        height: 60px;
        top: 80%;
        left: 20%;
        animation-delay: -4s;
    }
    .shapes:nth-child(4){
        width: 100px;
        height: 100px;
        top: 20%;
        left: 10%;
        animation-delay: -1s;
    }
    .shapes:nth-child(5){
        width: 90px;
        height: 90px;
        top: 70%;
        left: 10%;
        animation-delay: -3s;
    }
    @keyframes bounnce {
        0% , 20% , 50% , 80% , 100% {
            transform: translateY(0);
        }
        40%{
            transform: translateY(-20px);
        }
        60%{
            transform: translateY(-10px);
        }
    }
    @keyframes glow {
        from{
            text-shadow: 0 0 20px rgba(255 , 255 , 255 , 0.5);
        }
        to{
            text-shadow: 0 0 30px rgba(255 , 255 , 255 , 0.8) , 0 0 40px rgba(255 , 255 , 255 , 0.6);
        }
    }
    @keyframes fadeInup{
        from{
            opacity: 0;
            transform: translateY(30px);
        }
        to{
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
<body>
    <div class="container">
        <h1 class="error_code">404</h1>
        <h2 class="error_message">صفحه پیدا نشد</h2>
        <P class="error_description">
            مسیر مورد نظر شما در دنیای صفر و یک ها گم شده اما نگران نباش
            هنوز همه راه ها بسته نیستند بیا با هم به صفحه اصلی برگردیم و دوباره مسیر رو پیدا کنیم
        </P>
        <a href="" class="home_btn">بازگشت به خانه</a>
    </div>
    <div class="shape">
        <div class="shapes"></div>
        <div class="shapes"></div>
        <div class="shapes"></div>
        <div class="shapes"></div>
        <div class="shapes"></div>
    </div>
</body>
</html>
