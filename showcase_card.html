<!doctype html>
<html lang="fa">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کارت محصول</title>
  </head>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      font-family: "VazirMatn";
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      direction: rtl;
    }

    img {
      max-width: 100%;
      height: auto;
      vertical-align: top;
      transition: transform 0.5s ease;
    }

    hr {
      border: 0;
      height: 3px;
      width: 30px;
      background-color: #cf092c;
      margin: 22px 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    p {
      margin: 0 0 1.5em 0;
      font-family: "Vazirmatn__P";
    }

    /* کارت محصول */
    .product {
      position: relative;
      width: 450px;
      padding: 30px;
      border-radius: 8px;
      background-color: #fff;
      transition: box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 30px 20px -20px rgba(0, 0, 0, 0.15);
    }

    .product:hover {
      box-shadow: 0 36px 28px -20px rgba(0, 0, 0, 0.2);
    }

    .product .product__image {
      width: 180%;
      margin-left: -40%;
      margin-right: -40%;
      margin-top: -5px;
      margin-bottom: 30px;
      max-width: none;
      transition: transform 0.5s ease;
    }

    .product:hover .product__image {
      transform: scale(1.08) rotate(-5deg);
    }

    .product .product__title {
      font-size: 25px;
      color: #000;
      margin: 0 0 0.5em 0;
    }

    .product .product__price {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      top: -50px;
      left: -50px;
      width: 150px;
      height: 150px;
      background-color: rgba(0, 0, 0, 0.95);
      color: #fff;
      border-radius: 50%;
      font-size: 1.1em;
      font-weight: 700;
    }

    .product .product__btn {
      position: absolute;
      bottom: -30px;
      right: 30px;
      background-color: rgba(207, 9, 44, 0.95);
      box-shadow: 0 30px 25px -20px rgba(0, 0, 0, 0.15);
      color: #fff;
      text-align: center;
      padding: 1.1em 2.5em;
      border-radius: 5px;
      font-size: 15px;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .product__btn:hover {
      box-shadow: 0 36px 28px -20px rgba(0, 0, 0, 0.2);
      background-color: #3d0006;
      transform: scale(1.08);
    }
  </style>
  <body>
    <div class="product">
      <span class="product__price">۲,۵۰۰,۰۰۰ تومان</span>
      <img class="product__image" src="assets/IMAGES/shoe.png" alt="کفش نایک" />
      <h1 class="product__title">کفش نایک مدل Roshe Run</h1>
      <hr />
      <p>
        کفشی سبک و مدرن با طراحی جذاب و راحتی بی‌نظیر، مناسب برای پیاده‌روی و
        استفاده روزمره.
      </p>
      <a href="#" class="product__btn btn">خرید محصول</a>
    </div>
  </body>
</html>
